    SUF_flash_category:0 "Special Flash Project"
    SUF_flash_category_desc:0 "Вся страна Суфлеш держится на §Yфлеше§! £GFX_flash_text_icon . При помощи §Yфлеша§! £GFX_flash_text_icon  Суфлеш сможет развивать промышленость, армию и т.п.\n\nКол-во флеша в запасе: [?flash_count|+0] £GFX_flash_text_icon \n\nЕжемесячный прирост флеша: [?flash_plus|+0] £GFX_flash_text_icon \n\nЕжемесячное потребление флеша Суфлеш: [?flash_minus|-0] £GFX_flash_text_icon"
    SUF_flash_close_decision:0 "Конец экономике флеша"
    SUF_flash_change_mission:0 "Изменение кол-ва флеша"
 
    SUF_suflashs_state_focus:0 "Государство Суфлеш"
    SUF_suflashs_state_focus_desc:0 "Великие Чебоксары - личное государство Суфлеш. Как бы кто это не отрицал - это факт. Всё государство полностью подчинено воле Суфлеш и менять это никто не хочет"
    SUF_open_flash_focus:0 "Достать флеш со складов"
    SUF_open_flash_focus_desc:0 "Флеш - главный двигатель прогресса в нашей стране. При помощи него Суфлеш (мы не знаем как) может развивать экономику, военное производство и т.п. в максимально краткие сроки. Мы постараемся достать как можно больше флеша со складов, чтобы обеспечить Суфлеш его избытком"
    
    SUF_infrastructure_by_flash_focus:0 "Вложение в инфраструктуру от SFP"
    SUF_infrastructure_by_flash_focus_desc:0 "Первым делом необходимо обновить инфраструктуру страны, и это вполне достижимо при помощи SFP."
    SUF_war_fabric_by_flash_focus:0 "Отделение SFP по военному производству"
    SUF_war_fabric_by_flash_focus_desc:0 "Отныне военное производство поддерживается флешевыми субсидиями от SFP."
    SUF_civil_fabric_by_flash_focus:0 "Отделение SFP по гражданскому производству"
    SUF_civil_fabric_by_flash_focus_desc:0 "SFP решили вложится в гражданскую промышленность для поднятия ВВП страны и для того, чтобы народ не думал, что SFP создан только для обогащения определённых слоёв населения (во главе с Суфлеш конечно же)"
    SUF_manpower_by_flash_focus:0 "Массовая пропаганда службы в рядах ЧВК SFP"
    SUF_manpower_by_flash_focus_desc:0 "Люди могут не хотеть служить в армии государства, так как в основном это их обязаность. SFP предложили создать ЧВК с щедрыми выплатами тем, кто решится вступить в их ряды"
    SUF_stability_by_flash_focus:0 ""
    
    SUF_infrastructure_by_flash_focus:0 "Инфраструктурные проекты"
    SUF_infrastructure_by_flash_focus_desc:0 "Пора задействовать наш флеш в действии! Мы разработаем план улучшения нашей инфраструктуры при помощи флеша, что даст нам возможность тратить наши запасы на улучшения инфраструктуры"
    SUF_war_fabric_by_flash_focus:0 "Проекты военных заводов"
    SUF_war_fabric_by_flash_focus_desc:0 "Война - это рэкет! И производство ещё большего количества пушек и боеприпасов поможет нам проводить этот рэкет в несколько раз эффективнее!"
    SUF_civil_fabric_by_flash_focus:0 "Проекты фабрик"
    SUF_civil_fabric_by_flash_focus_desc:0 "Улучшение промышленности страны есть важная часть развития государства. Поэтому нам необходимо разработать план стройки новых фабрик при помощи флеша"
    SUF_manpower_by_flash_focus:0 "В армию! (За флеш)"
    SUF_manpower_by_flash_focus_desc:0 "Любого человека можно заставить что-то делать, либо наказанием, либо поощерением. Мы используем флеш как весомый аргумент для служения нашему великому государству"
    SUF_stability_by_flash_focus:0 "Флешевая стабилизация"
    SUF_stability_by_flash_focus_desc:0 "Флеш - наше всё. И с помощью него, я уверен, мы сможем стабилизировать то шаткое строение, что мы зовём страной"
    SUF_war_support_by_flash_focus:0 "Флеш - спонсор войны"
    SUF_war_support_by_flash_focus_desc:0 "При помощи флеша мы точно сможем заставить народ поддерживать нашу войну, даже если она полностью неправомерна"
    SUF_buy_czuwaszyja_focus:0 "Купить Чувашию"
    SUF_buy_czuwaszyja_focus_desc:0 "Пора расширить нашу территорию - мы купим территории Чувашии у СССР за флеш!"
    
    suflash.1.t:0 "Воля Суфлеш"
    suflash.1.desc:0 "Великие Чебоксары - не такое уж и большое государство, но амбиции их лидера - огромны. Суфлеш - гениальный стратег, которая смогла получить землю для своего государства посреди Советского Союза. И у неё уже есть план, как получить ещё больше территорий. Возможно, даже заиметь территорию всего СССР."
    suflash.1.a:0 "Да здравствует Суфлеш!"
    