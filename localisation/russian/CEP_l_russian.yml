  #Events
  cephalon.1.t:0 "Возвращение участников"
  cephalon.1.desc:0 "Сегодня со всех стран в Цефалон возвращаются участники общества. Общество никогда не теряло надежды на то, что мы вернёмся в этот Великий Город. Однако мы не должны забывать, что независимость Цефалон получил из-за гражданской войны на Территории Хины, поэтому угроза нашему суверенитету никуда не пропала. Мы готовы защищать Цефалон любой ценой!"
  cephalon.1.a:0 "Цефалон выстоит!"