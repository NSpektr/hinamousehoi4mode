l_russian:
    hmm_bookmark:0 "Chmish Blues"
    hmm_bookmark_desc:0 "Мир, состоящий их госудаств втуберов (и не только). Новые цели, амбиции, и т.д."
    HMM_SCENARIO_DESC:0 "Территория Хины давно считается маяком ламповости в этом мире. Множество людей приезжают сюда, чтобы просто жить и радоваться. Однако с недавних пор стоит вопрос о смене политики в Территории, ведь на востоке уже назревает угроза в виде тиранического режима Суфлеш, который прямо заявляет о своих намерениях на весь мир.\n\nСможет ли Территория выстоять? Или же она падёт, уступая дорогу новым режимам?"
    SUF_SCENARIO_DESC:0 ""Ад на земле" - неофициальное прозвище государства, находящегося под полным управлениием Суфлеш. И сложно поспорить с этим утверждением, ведь даже сама Суфлеш этого не отрицает. Любая опозиция была и будет разогнана, а вся власть безусловно принадлежит Суфлеш.\n\nСможет ли она реализовать свои планы, либо же кто то сможет свергнуть тиранию?"
    