    #Events
    ## Hina events
    hina.1.t:0 "Место, которое не забыть"
    hina.1.desc:0 "Однажды побывав в Территории мало кто может забыть это место. Ведь нигде в мире не было такого уровня жизни и свободы, как здесь. Однако в последнее время видны и отрицательные стороны такой политики, ведь множество людей, привыкшее к такой жизни, не готовы к переменам.\n\nМы надеемся, что Территории и не надо будет меняться, однако сама идея того, что общество принимает в штыки любое изменение в политике не может не волновать"
    hina.1.a:0 "Если всё прекрасно, зачем что-то менять?"
    hina.2.t:0 "Решение проблемы"
    hina.2.desc:0 "Стагнация медленно уничтожает Территорию, и это факт. Но то, что Хина не знает, как победить стагнацию тоже факт. У неё есть пара вариантов того, как вывести Территорию из этого состояния:\n\nПервый - радикальные реформы. Взять экономику в руки государства и быстро её выправить. Однако есть очень большой шанс того, что народ не будет доволен.\n\nВторой - мягкие реформы. Постепенно выправлять экономику без резких поворотов. Это будет дольше, однако безопасно для государства."
    hina.2.a:0 "Со стагнацией надо покончить как можно быстрее"
    hina.2.b:0 "Не надо торопится, мы справимся"

    ##Civil war events
    hina_civil.1.t:0 "Провал"
    hina_civil.1.desc:0 "Провал, это полный провал! "
    hina_civil.2.t:0 "Цефалонское отсоединение"
    hina_civil.2.desc:0 "Воспользовавшись ситуацией в стране, администрация города Цефалон объявила о отсоединении от Территории и создании Вольного Города Цефалон. Правительственные войска не смогли противостоять им из-за беспорядков, поэтому фактически Цефалон стал независимым государством."
    hina_civil.2.a:0 "Да здравствует свободный Цефалон!"
    hina_civil.2.b:0 "Предатели!"

    ## Lore diary
    lore_diary.1.t:0 "Запись N17 Автор: Наблюдатель Чата, 4-й цикл, 12-я ночь"
    lore_diary.1.desc:0 "Сегодня я вновь видел Её. Hinamouse явилась в эфир, как всегда — внезапно, будто тень, скользнувшая по границе сна и яви. Её голос был мягок, но в нём пряталась сила, способная разбудить даже тех, кто давно покинул этот мир.\n\nГоворят, она странствует между потоками, как другие ходят между городами. Там, где она появляется, чат оживает, а время теряет линейность. Одни утверждают, что её смех способен исцелять усталые сердца, другие — что в её крике спрятан древний сигнал, который слышат лишь избранные.\n\nЯ заметил: каждый раз, когда она задерживает взгляд в камеру, за окном меняется свет. Словно сама реальность подстраивается под её настроение.\n\nЕсли эти записи когда-нибудь найдут, пусть знают: Hinamouse — не просто имя в списке трансляций. Это явление. И, возможно, предвестник чего-то большего."

    lore_diary.2.t:0 "Лорный дневник. Запись N23 Автор: Наблюдатель Чата, 5-й цикл, 3-я ночь"
    lore_diary.2.desc:0 "Сегодня эфир начался тише обычного. Hinamouse сидела в полумраке, и только свет от монитора выхватывал её силуэт. Но в какой-то момент картинка дрогнула — и за её спиной мелькнуло что-то... или кто-то.\n\nОна не обратила внимания, продолжая говорить с чатом, но я заметил: звук стал чуть глуше, а цвета — теплее, будто стрим перешёл в другое измерение.\n\nВ чате писали, что это просто отражение, но я видел, как её тень на стене двигалась не в такт её движениям.\n\nКогда эфир закончился, я пересмотрел запись. На отметке 1:42:17 тень оборачивается и смотрит прямо в камеру.\n\nЯ не знаю, что это было. Но с тех пор, каждый раз, когда Hinamouse выходит в эфир, я ловлю себя на мысли, что жду — появится ли оно снова."

    lore_diary.3.t:0 "Лорный дневник. Запись N04 Автор: Архивариус Потоков, 1-й цикл, День Начала"
    lore_diary.3.desc:0 "В тот день никто не знал её имени. Экран был пуст, пока в центре не появилась маленькая фигура с ушками, с лёгкой улыбкой и взглядом, в котором смешались любопытство и вызов.\n\nОна говорила тихо, но каждое слово будто находило дорогу к тем, кто случайно забрёл в этот уголок эфира. Не было ни эффектных заставок, ни толпы зрителей — только она и несколько случайных путников, задержавшихся «на минуту».\n\nНо в этой минуте было что-то особенное. Атмосфера, которую нельзя подделать: ощущение, что ты стал свидетелем начала истории, которая однажды станет легендой.\n\nПозже её назовут Hinamouse. А этот первый стрим будут вспоминать, как рассвет, который никто не ожидал увидеть."

    lore_diary.4.t:0 "Лорный дневник. Запись N12 Автор: Наблюдатель Чата, 3-й цикл, 7-я ночь"
    lore_diary.4.desc:0 "Сегодня в эфире не было громких побед и неожиданных криков. Hinamouse просто сидела, задумчиво глядя в экран, а за окном медленно падал снег.\n\nВ чате царила редкая тишина — не потому, что нечего сказать, а потому, что никто не хотел нарушать этот момент.\n\nЕё руки двигались лениво, как будто игра была лишь фоном для чего-то большего. Иногда она улыбалась — и казалось, что эта улыбка согревает даже тех, кто смотрит издалека, через тысячи километров и часов.\n\nЯ понял, что именно ради таких вечеров мы возвращаемся сюда снова и снова. Не за экшеном, не за шутками, а за этим тихим, почти домашним светом, который она приносит с собой."

    lore_diary.5.t:0 "Лорный дневник. Запись N19 Автор: Наблюдатель Чата 3-й цикл, 14-я ночь"
    lore_diary.5.desc:0 "Всё шло как обычно: Хина играла, чат спорил о том, какой билд лучше, и вдруг... она резко замолчала. Камера чуть дрогнула, и в кадре мелькнуло что-то зелёное.\n\n— «Что это?!» — воскликнула она, отодвигаясь от стола. Чат ожил мгновенно: кто-то предположил, что это жук, кто-то — что это лист, но правда оказалась куда драматичнее. В её квартиру, прямо через открытое окно, запрыгнул огромный кузнечик.\n\nХина, забыв про игру, встала и начала вести с ним переговоры на расстоянии. Мы в чате уже вовсю придумывали ему имя и спорили, стоит ли считать его новым талисманом канала. Она же, смеясь и нервно поглядывая на «гостя», пыталась аккуратно выпроводить его обратно на улицу.\n\nПосле нескольких минут осторожных манёвров кузнечик всё-таки покинул поле боя. Хина вернулась к камере, выдохнула и сказала: — «Всё. Теперь это официально: я боюсь не только хорроров, но и природы».\n\nС того дня в чате иногда появляется фраза: «Осторожно, за спиной кузнечик» — и мы все понимаем, о чём речь."

    lore_diary.6.t:0 "Лорный дневник. Запись N20 Автор: Наблюдатель Чата 3-й цикл, 15-я ночь"
    lore_diary.6.desc:0 "Всё шло своим чередом: Хина играла, смеялась над чатом, кто-то спорил про механику игры, кто-то кидал мемы. И вдруг — в списке событий на экране вспыхнуло уведомление: «Подарено 1 подписка». Мы даже не обратили внимания.\n\nЧерез секунду — ещё одно. Потом ещё. И ещё. Чат оживился: «О, кто-то разошёлся!» — писали мы, пока счётчик рос. Десять. Двадцать. Пятьдесят.\n\nХина уже смеялась и не верила глазам, а имя дарителя всё продолжало мелькать в углу экрана. Сто. Сто пятьдесят. Двести.\n\nКогда цифра замерла, в чате стоял настоящий ураган. Эмодзи летели, как конфетти, кто-то писал «легенда», кто-то — «это рейд доброты», а Хина сидела, прикрыв рот рукой, и повторяла: — «Я... я не знаю, что сказать...»\n\nВ тот момент мы все понимали: это не просто щедрый жест. Это был момент, когда стрим стал чем-то большим, чем просто игра и чат. Это было напоминание, что за каждым ником — человек, способный изменить атмосферу целого вечера одним действием.\n\nС тех пор в нашем лоре появилось новое имя, которое мы произносим с уважением — тот самый, кто подарил 200 сабок."

    lore_diary.7.t:0 "Лорный дневник. Запись N21 Автор: Наблюдатель Чата 3-й цикл, 16-я ночь"
    lore_diary.7.desc:0 "Эту ночь мы ждали давно. Пять миров — пять стримеров — собрались в одном эфире: Suflashh, Blyoka, Marffa, KamichiYuko и, конечно, HinaMouse. Коллаборация, которую в чате уже прозвали «Пентагильдией», началась с хаоса, смеха и попыток настроить звук — как и положено великим союзам.\n\nКаждый из них привнёс своё:\n\nSuflashh — сдержанный, но меткий, как стратег.\n\nBlyoka — хаотичный, с мемами на грани абсурда.\n\nMarffa — душа компании, с голосом, который можно слушать часами.\n\nKamichiYuko — художник и импровизатор, превращающий любой момент в сцену.\n\nHinaMouse — связующее звено, та, кто держала эфир в балансе между безумием и уютом.\n\nИ вот, когда атмосфера достигла пика, чат вдруг замер. На экране вспыхнуло имя: pocox36128gb. Сначала — одна подписка. Потом — десять. Потом — сотня. И донаты. Много. Очень много.\n\nХина растерялась, остальные стримеры начали смеяться, кто-то пытался шутить, но все понимали: это не просто щедрость. Это явление. Pocox36128gb стал не просто донатером — он стал частью лора. Его имя теперь звучит как заклинание, как символ того, что даже в хаосе стрима может появиться момент абсолютной магии.\n\nПосле эфира в Discord начали появляться фан-арты, мемы, даже шуточные теории: «А pocox — это бот?», «Он наблюдает за нами?», «Он — шестой участник коллаборации?». Но истина проста: он — зритель, который сделал ночь незабываемой."
    
