    # hina_republic.5.desc:0 "Хеби Гнидарума организовал Мышинисткую Партию Камышни для того, чтобы продвигать в Камышне свою идеологию мышинизма. Мышинизм является отвлетвлением от хинаизма, но он не является его полной копиркой. Мышинизм завязан на сплетении хинаизма с уникальной советской идеологией."
