    aleksa_cephalon.1.t:0 "Цефалонское общество"
    aleksa_cephalon.1.desc:0 "Недавно общество смогло установить свою власть на Территории Хины в ходе гражданской войны. Цефалон издавна считался центром общества, но из-за Территории множество участников общества базировались на Территории Алексы. Теперь многие возвращаются в Цефалон для помощи обществу, а другие требуют от Алексы подчинения её Территории правительству общества."
    aleksa_cephalon.1.a:0 "- Вы можете на меня положится"
    aleksa_cephalon.2.b:0 "- Не следует торопить события"